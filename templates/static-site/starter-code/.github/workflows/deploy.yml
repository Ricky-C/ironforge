name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      correlation_id:
        description: >-
          Ironforge job ID. Set by the platform's trigger-deploy step;
          embedded in run-name so wait-for-deploy can identify this
          specific run via listWorkflowRuns + name match. Optional for
          manual operator dispatches.
        required: false
        type: string

# run-name renders the correlation_id when present so the platform's
# wait-for-deploy poller can identify this run by name. Manual user
# pushes (push: branch trigger) and operator-initiated workflow_dispatch
# without a correlation_id render plain "Deploy".
run-name: ${{ inputs.correlation_id && format('Deploy [{0}]', inputs.correlation_id) || 'Deploy' }}

# Action versions are pinned to major tags. Do NOT switch to @main or
# @latest — supply-chain hygiene. To upgrade, bump the major version
# explicitly after reviewing the changelog.
#
# Repo secrets used below are populated by the Ironforge platform's
# trigger-deploy step on initial provisioning. They are NOT automatically
# re-populated on infrastructure rotations (deploy role re-creation,
# bucket rename, etc.) — see docs/tech-debt.md § "Repo-secrets staleness
# on infrastructure rotation" for the failure mode + recovery procedure.

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.IRONFORGE_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync site to S3
        run: |
          aws s3 sync . s3://${{ secrets.IRONFORGE_BUCKET_NAME }} \
            --delete \
            --exclude '.git/*' \
            --exclude '.github/*' \
            --exclude 'README.md'

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.IRONFORGE_DISTRIBUTION_ID }} \
            --paths '/*'
