name: infra-plan

on:
  pull_request:
    paths:
      - "infra/**"
      - "services/api/**"
      - "services/cost-reporter/**"
      - "services/workflow/**"
      - ".github/workflows/infra-plan.yml"

permissions:
  id-token: write       # OIDC token request
  contents: read        # checkout
  pull-requests: write  # post plan comment

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: us-east-1
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.2"
  PLAN_TRUNCATE_LIMIT: "60000"

jobs:
  plan:
    name: Plan ${{ matrix.composition }}
    runs-on: ubuntu-latest
    # Code-level fork-PR guard. GitHub already withholds `secrets.*` from
    # fork-PR `pull_request` workflows (so OIDC credential configuration would
    # fail anyway), but encoding the check here makes the protection an
    # explicit invariant rather than dependent on a GitHub policy detail.
    # Fork PRs that need a plan: maintainer pulls locally and runs plan.
    #
    # Dependabot is also skipped: GitHub puts Dependabot-triggered runs in a
    # separate restricted-secrets context, so `secrets.AWS_OIDC_PLAN_ROLE_ARN`
    # is empty and the credentials step fails. Dependabot's PRs only touch
    # `.github/workflows/*.yml` (action version bumps) and workspace
    # `package.json` files — never `infra/**` — so the Terraform plan against
    # AWS isn't meaningful for those changes anyway.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    strategy:
      fail-fast: false
      matrix:
        composition: [shared, dev]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build cost-reporter Lambda
        # Required for shared composition's data.archive_file to find dist/index.js.
        if: matrix.composition == 'shared'
        run: pnpm --filter @ironforge/cost-reporter build

      - name: Build api Lambda
        # Required for dev/prod composition's data.archive_file to find dist/handler.js.
        if: matrix.composition == 'dev' || matrix.composition == 'prod'
        run: pnpm --filter @ironforge/api build

      - name: Build workflow task Lambdas
        # Required for dev/prod composition's 8 task Lambda archive_file
        # data sources. Glob matches the 8 services/workflow/<step>/
        # workspaces; @ironforge/workflow-stub-lib is also matched but its
        # build is a no-op (source-only, consumed via "exports" field).
        if: matrix.composition == 'dev' || matrix.composition == 'prod'
        run: pnpm --filter "@ironforge/workflow-*" build

      - name: Configure AWS credentials (OIDC plan role)
        # Must precede the run-terraform container image build below —
        # build-image.sh calls `aws sts get-caller-identity` and
        # `aws ecr get-login-password`, both of which need credentials in
        # the environment. Mirrors the order in infra-apply.yml.
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        # Required for the run-terraform container image build (linux/arm64
        # cross-platform from the GitHub Actions runner). See ADR-009
        # § Amendments (PR-C.6 binary-footprint trigger).
        if: matrix.composition == 'dev' || matrix.composition == 'prod'
        uses: docker/setup-buildx-action@v4

      - name: Build run-terraform container image
        # Required for dev composition's task_run_terraform Lambda (which
        # uses package_type=Image). Downloads + verifies pinned terraform
        # 1.10.4 + AWS provider 5.83.0 (linux_arm64); bundles the handler
        # via the workflow-build step above; assembles into a container
        # image; pushes to ECR. Output: .image-uri file the dev composition
        # reads at plan time. See ADR-009 § Amendments.
        if: matrix.composition == 'dev' || matrix.composition == 'prod'
        run: bash infra/modules/terraform-lambda-image/build-image.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Set composition-specific TF_VAR_environment
        if: matrix.composition == 'dev' || matrix.composition == 'prod'
        run: echo "TF_VAR_environment=${{ matrix.composition }}" >> "$GITHUB_ENV"

      - name: Write backend.hcl
        working-directory: infra/envs/${{ matrix.composition }}
        run: |
          cat > backend.hcl <<EOF
          bucket = "ironforge-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}"
          EOF

      - name: Terraform init
        working-directory: infra/envs/${{ matrix.composition }}
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Write CI-managed auto.tfvars (list-typed vars)
        # See infra-apply.yml for the full rationale. Brief summary:
        # terraform 1.10+ rejects list-typed TF_VAR_* env vars across the
        # internal plan->apply boundary; tfvars files don't trip that
        # check. Written into both compositions' workspaces; dev doesn't
        # declare budget_action_target_roles (harmless undeclared-variable
        # warning), shared composition consumes it.
        working-directory: infra/envs/${{ matrix.composition }}
        run: |
          cat > ci.auto.tfvars <<'EOF'
          budget_action_target_roles = ["ironforge-ci-apply", "ironforge-dev-run-terraform-execution"]
          EOF

      - name: Terraform plan
        working-directory: infra/envs/${{ matrix.composition }}
        env:
          TF_VAR_alert_email: ${{ secrets.TF_VAR_ALERT_EMAIL }}
          TF_VAR_github_org_name: ${{ secrets.TF_VAR_GITHUB_ORG_NAME }}
          TF_VAR_github_app_id: ${{ secrets.TF_VAR_GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.TF_VAR_GITHUB_APP_INSTALLATION_ID }}
        run: |
          terraform plan -input=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment plan on PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const composition = "${{ matrix.composition }}";
            const limit = parseInt(process.env.PLAN_TRUNCATE_LIMIT, 10);
            const planPath = `infra/envs/${composition}/plan.txt`;
            const plan = fs.readFileSync(planPath, "utf8");
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let header = `### Terraform Plan: \`${composition}\`\n\n`;
            let displayed;

            if (plan.length > limit) {
              header += `> [!WARNING]\n> Plan output truncated (${plan.length} chars > ${limit} limit). See [the full workflow run](${runUrl}) for the complete plan.\n\n`;
              displayed = plan.slice(0, limit);
            } else {
              displayed = plan;
            }

            const body = `${header}<details>\n<summary>Show plan</summary>\n\n\`\`\`hcl\n${displayed}\n\`\`\`\n\n</details>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
