name: infra-apply

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "services/api/**"
      - "services/cost-reporter/**"
      - "services/workflow/**"
      # templates/** is baked into the run-terraform Lambda image at
      # build time (per ADR-009 — Dockerfile COPY). A change to a
      # template requires the image to be rebuilt + pushed + the
      # Lambda's image_uri updated via terraform apply. Discovered
      # missing during Phase 1.5 PR 6a (force_destroy fix on the
      # static-site origin bucket), where the merge succeeded but the
      # Lambda kept running the old image until infra-apply was
      # manually dispatched.
      - "templates/**"
      - ".github/workflows/infra-apply.yml"
  # workflow_run sequences this workflow AFTER app-deploy.yml completes
  # on main. ADR-011 PR-B's Y2 design (SSM image-URI handoff) requires
  # app-deploy.yml to write SSM with the real image URI BEFORE
  # terraform reads the data source on plan; this trigger enforces
  # that ordering on first-merge of any portal Lambda change. The
  # apply-shared job's `if:` filters workflow_run runs to successful
  # app-deploy completions only.
  workflow_run:
    workflows: ["app-deploy"]
    types: [completed]
    branches: [main]
  # Manual trigger for cases where state needs to re-converge against
  # current source-of-truth values without an HCL change. Required when
  # `data.aws_ssm_parameter.*` values change out-of-band — manual
  # `aws ssm put-parameter` updates SSM, but Lambda env vars are baked
  # at apply time, so a re-apply is needed to propagate to the runtime.
  # See docs/runbook.md § "GitHub App installation-id drift" for the
  # canonical use case (App reinstall / migration between accounts).
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: us-east-1
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.2"

# Serialize applies. Don't cancel an in-progress apply if a new push lands —
# halfway-applied state is worse than waiting.
concurrency:
  group: infra-apply
  cancel-in-progress: false

jobs:
  apply-shared:
    name: Apply shared composition
    runs-on: ubuntu-latest
    # workflow_run-triggered runs only proceed if the upstream app-deploy
    # workflow succeeded. Push and workflow_dispatch triggers always
    # proceed (the conditional short-circuits to true for non-workflow_run
    # event names). Without this, a failed app-deploy would cascade an
    # unwanted apply attempt with potentially stale SSM state.
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    # GitHub Environment "production" provides the manual-approval gate and
    # the 5-minute wait timer (configured in repo settings, not here).
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build cost-reporter Lambda
        run: pnpm --filter @ironforge/cost-reporter build

      - name: Configure AWS credentials (OIDC apply role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mirror portal placeholder image (idempotent)
        # ADR-011 § Pre-implementation Gap 1 (b): ensures
        # public.ecr.aws/lambda/nodejs:22 is mirrored to our private ECR as
        # `:placeholder` for recovery scenarios. Unreachable in normal
        # operation under workflow_run sequencing (app-deploy.yml writes
        # SSM with the real image URI before this workflow's terraform
        # creates Lambda). If you ever see Lambda invoking the placeholder,
        # something has gone wrong — app-deploy.yml didn't run, SSM
        # deleted manually, etc. Useful signal.
        #
        # Idempotent: skip if `:placeholder` tag already exists in ECR.
        # Per-run cost ~5s when the tag exists; ~30s on first-ever mirror.
        run: |
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ECR_REPO="ironforge-portal"

          if aws ecr describe-images \
              --repository-name "$ECR_REPO" \
              --image-ids imageTag=placeholder >/dev/null 2>&1; then
            echo "Placeholder exists in ECR; skipping mirror."
          else
            echo "Mirroring public.ecr.aws/lambda/nodejs:22 to $ECR_REGISTRY/$ECR_REPO:placeholder"
            docker pull public.ecr.aws/lambda/nodejs:22
            docker tag public.ecr.aws/lambda/nodejs:22 "$ECR_REGISTRY/$ECR_REPO:placeholder"
            aws ecr get-login-password --region "${{ env.AWS_REGION }}" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker push "$ECR_REGISTRY/$ECR_REPO:placeholder"
            echo "Placeholder mirrored."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write backend.hcl
        working-directory: infra/envs/shared
        run: |
          cat > backend.hcl <<EOF
          bucket = "ironforge-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}"
          EOF

      - name: Terraform init
        working-directory: infra/envs/shared
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Write CI-managed auto.tfvars (list-typed vars)
        # terraform 1.10+ rejects list/tuple TF_VAR_* env vars as
        # conflicting with the in-memory saved plan that `terraform apply`
        # builds: the saved plan freezes the value's tuple-vs-list type,
        # and re-evaluating the env var at apply produces a structurally-
        # equal but type-tagged-differently tuple, which trips the "Can't
        # change variable when applying a saved plan" guard. Scalar TF_VAR_*
        # env vars (alert_email, github_*) are unaffected and stay below.
        # List-typed values move to a tfvars file (auto-loaded by the
        # *.auto.tfvars naming, read consistently across plan and apply).
        # File matched by repo .gitignore's `*.tfvars` rule.
        #
        # budget_action_target_roles enables the cost-safeguards $50 budget
        # action by populating the role list the deny policy attaches to
        # at breach. Single-source via this workflow file (PR-tracked,
        # git-visible); local terraform.tfvars stays empty to avoid
        # oscillating state. Role names are non-sensitive (already in
        # `aws iam list-roles`) so a literal is preferred over a Secret.
        # To add/remove a target principal, edit the heredoc value below
        # in both apply + plan workflows.
        working-directory: infra/envs/shared
        run: |
          cat > ci.auto.tfvars <<'EOF'
          budget_action_target_roles = ["ironforge-ci-apply", "ironforge-dev-run-terraform-execution"]
          EOF

      - name: Terraform apply
        working-directory: infra/envs/shared
        env:
          TF_VAR_alert_email: ${{ secrets.TF_VAR_ALERT_EMAIL }}
          TF_VAR_github_org_name: ${{ secrets.TF_VAR_GITHUB_ORG_NAME }}
          TF_VAR_github_app_id: ${{ secrets.TF_VAR_GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.TF_VAR_GITHUB_APP_INSTALLATION_ID }}
        run: terraform apply -input=false -auto-approve

  apply-dev:
    name: Apply dev composition
    runs-on: ubuntu-latest
    needs: apply-shared
    # Same environment as apply-shared. The environment declaration is what
    # makes the OIDC token's `sub` claim take the form
    # `repo:OWNER/REPO:environment:production`, which is the only sub claim
    # the apply role's trust policy accepts. Without this line, the OIDC
    # token's sub is `ref:refs/heads/main` and AssumeRoleWithWebIdentity is
    # rejected. Splitting dev into its own environment with a lighter gate
    # is tracked in docs/tech-debt.md.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api Lambda
        # Required for dev composition's data.archive_file to find dist/handler.js.
        run: pnpm --filter @ironforge/api build

      - name: Build workflow task Lambdas
        # Required for dev composition's 8 task Lambda archive_file data
        # sources. Glob matches the 8 services/workflow/<step>/ workspaces;
        # @ironforge/workflow-stub-lib is also matched but its build is a
        # no-op (source-only, consumed via "exports" field).
        run: pnpm --filter "@ironforge/workflow-*" build

      - name: Configure AWS credentials (OIDC apply role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        # Required for the run-terraform container image build per
        # ADR-009 § Amendments (PR-C.6 binary-footprint trigger).
        uses: docker/setup-buildx-action@v4

      - name: Build run-terraform container image
        # Required for dev composition's task_run_terraform Lambda
        # (package_type=Image). Downloads + verifies pinned terraform +
        # AWS provider; assembles container image; pushes to ECR.
        # Output: .image-uri file consumed by terraform plan.
        run: bash infra/modules/terraform-lambda-image/build-image.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write backend.hcl
        working-directory: infra/envs/dev
        run: |
          cat > backend.hcl <<EOF
          bucket = "ironforge-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}"
          EOF

      - name: Terraform init
        working-directory: infra/envs/dev
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform apply
        working-directory: infra/envs/dev
        env:
          TF_VAR_environment: dev
        run: terraform apply -input=false -auto-approve
